<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Spotify Song/Playlist Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
  <header>
    <nav>
      <span class="brand">Spotify Song/Playlist Analyzer</span>
      <a href="#/songs" data-route="songs">Song Analysis</a>
      <a href="#/genre" data-route="genre">Genre</a>
      <a href="#/trends" data-route="trends">Streaming Trends</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    W209 Final Project &mdash; Prithvi Kanherkar &amp; Sabrina Lam &mdash;
    uploaded files are parsed in your browser and never leave your machine.
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
